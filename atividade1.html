<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de aluno</title>
</head>
<body>
    <h1>CADASTRO DE ALUNO</h1>
    
    <form >
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome" placeholder="DIGITE SEU NOME" required>

        <label for="email">Email:</label>
        <input type="email" name="email id"email>
        
        <label for="password">Senha</label>
        <input type="password" name="password" id="password">
        
        <label for="data-nascimento">DATA DE <NASCIMENTO>
        <input type="date" name="data-nascimento" id="data-nascimento">
        
        <label for="cidade">CIDADE</label>
        <select name="cidade" id="cidade">
        <option>LONDRINA</option>
        <option>MARINGÁ</option>
        <option>CRACOLÂNDIA</option>
        </select>
        
        <label for="curso" >JÁ FEZ O CURSO?</label>
        <input type="radio" name="curso">
        SIM
        <input type="radio" name="curso">
        NÂO

        <!-- input checkbox -->
        
        <LAbel>
        <input type="checkbox" name="termos" id="termos" >
        ACEITOS OS TERMOS
        </LAbel>

        <!-- textarea -->
        <label >observacao:</label>
        <textarea rows="4" placeholder="FAÇA UMA OBSERVAÇÂO"></textarea>

        <!-- button -->
        <button type="submit"> CADASTRAR</button>
    </form>
</body>
</html>
